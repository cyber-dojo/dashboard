
networks:
  cyber-dojo:
    driver: bridge

services:

  client:
    image: ${CYBER_DOJO_DASHBOARD_CLIENT_IMAGE}:${CYBER_DOJO_DASHBOARD_TAG}
    platform: linux/amd64
    user: ${CYBER_DOJO_DASHBOARD_CLIENT_USER}
    build:
      args:
        - COMMIT_SHA
      context: source/client
    depends_on:
      - dashboard
    env_file: [ .env ]
    read_only: true
    restart: no
    volumes:
      - ./test:/dashboard/test:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  dashboard:
    image: ${CYBER_DOJO_DASHBOARD_IMAGE}:${CYBER_DOJO_DASHBOARD_TAG}
    platform: linux/amd64
    user: ${CYBER_DOJO_DASHBOARD_SERVER_USER}
    build:
      args:
        - COMMIT_SHA
      context: .
    depends_on:
      - differ
      - saver
    env_file: [ .env ]
    ports: [ "${CYBER_DOJO_DASHBOARD_PORT}:${CYBER_DOJO_DASHBOARD_PORT}" ]
    read_only: true
    restart: no
    volumes:
      - ./source/server:/dashboard/source:ro
      - ./test:/dashboard/test:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          mode: 01777
          size: 10485760  # 10MB

  # - - - - - - - - - - - - - - - - - - - - - - - - -

  nginx:
    image: ${CYBER_DOJO_NGINX_IMAGE}:${CYBER_DOJO_NGINX_TAG}
    platform: linux/amd64
    depends_on:
      - web
    user: root
    init: true
    ports: [ "${CYBER_DOJO_NGINX_HOST_PORT:-80}:80" ]
    restart: "no"

  web:
    depends_on:
      - creator
      - differ
      - runner
      - dashboard
    image: ${CYBER_DOJO_WEB_IMAGE}:${CYBER_DOJO_WEB_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    tmpfs: /tmp
    restart: no

  differ:
    depends_on:
      - saver
    image: ${CYBER_DOJO_DIFFER_IMAGE}:${CYBER_DOJO_DIFFER_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    restart: "no"
    tmpfs: /tmp

  runner:
    image: ${CYBER_DOJO_RUNNER_IMAGE}:${CYBER_DOJO_RUNNER_TAG}
    platform: linux/amd64
    user: root
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no
    volumes: [ "/var/run/docker.sock:/var/run/docker.sock" ]

  saver:
    image: ${CYBER_DOJO_SAVER_IMAGE}:${CYBER_DOJO_SAVER_TAG}
    platform: linux/amd64
    user: saver
    env_file: [ .env ]
    init: true
    read_only: true
    restart: no
    tmpfs:
      - /cyber-dojo:uid=19663,gid=65533
      - /tmp:uid=19663,gid=65533

  creator:
    depends_on:
      - custom-start-points
      - exercises-start-points
      - languages-start-points
    image: ${CYBER_DOJO_CREATOR_IMAGE}:${CYBER_DOJO_CREATOR_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  custom-start-points:
    image: ${CYBER_DOJO_CUSTOM_START_POINTS_IMAGE}:${CYBER_DOJO_CUSTOM_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  exercises-start-points:
    image: ${CYBER_DOJO_EXERCISES_START_POINTS_IMAGE}:${CYBER_DOJO_EXERCISES_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no

  languages-start-points:
    image: ${CYBER_DOJO_LANGUAGES_START_POINTS_IMAGE}:${CYBER_DOJO_LANGUAGES_START_POINTS_TAG}
    platform: linux/amd64
    user: nobody
    env_file: [ .env ]
    read_only: true
    tmpfs: /tmp
    restart: no
